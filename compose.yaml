---
# =============================================================================
# Base compose file – shared by dev and prod.
# Dev overrides:  compose.override.yaml  (auto-loaded)
# Prod overrides: compose.prod.yaml      (explicit -f)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Reverse Proxy  (Caddy) – single entry point for all services
  # ---------------------------------------------------------------------------
  proxy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    depends_on:
      - php
      - app
    environment:
      PROXY_DOMAIN: ${PROXY_DOMAIN:-local.gd}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - proxy_data:/data
      - proxy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"

  # ---------------------------------------------------------------------------
  # API  (Symfony / FrankenPHP)
  # ---------------------------------------------------------------------------
  php:
    image: ${IMAGES_PREFIX:-}app-php
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      SERVER_NAME: php:80
      OTEL_PHP_AUTOLOAD_ENABLED: "true"
      OTEL_SERVICE_NAME: order-api
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-16}&charset=${POSTGRES_CHARSET:-utf8}
      MERCURE_URL: ${CADDY_MERCURE_URL:-http://php/.well-known/mercure}
      MERCURE_PUBLIC_URL: https://app.${PROXY_DOMAIN:-local.gd}/.well-known/mercure
      MERCURE_JWT_SECRET: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      SYMFONY_VERSION: ${SYMFONY_VERSION:-}
      STABILITY: ${STABILITY:-stable}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  # ---------------------------------------------------------------------------
  # Database  (PostgreSQL)
  # ---------------------------------------------------------------------------
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  # ---------------------------------------------------------------------------
  # Frontend  (React / TanStack Start)
  # ---------------------------------------------------------------------------
  app:
    image: ${IMAGES_PREFIX:-}app-frontend
    restart: unless-stopped
    depends_on:
      - php

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  tempo:
    image: ${TEMPO_IMAGE}
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo

  loki:
    image: ${LOKI_IMAGE}
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--web.enable-remote-write-receiver"]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    restart: unless-stopped

  otel-collector:
    image: ${COLLECTOR_CONTRIB_IMAGE}
    command: ["--config=/etc/otel-collector-config.yaml"]
    depends_on:
      - tempo
      - loki
      - prometheus
    volumes:
      - ./docker/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"

  grafana:
    image: ${GRAFANA_IMAGE}
    depends_on:
      - tempo
      - loki
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SERVER_ROOT_URL: https://grafana.${PROXY_DOMAIN:-local.gd}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml

  jaeger:
    image: ${JAEGER_IMAGE}
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "14250:14250"
      - "14268:14268"
    restart: unless-stopped

volumes:
  proxy_data:
  proxy_config:
  caddy_data:
  caddy_config:
  database_data:
  tempo_data:
  grafana_data:
  loki_data:
  prom_data:
