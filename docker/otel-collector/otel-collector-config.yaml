receivers:
    otlp:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4317
            http:
                endpoint: 0.0.0.0:4318
processors:
    batch:
        timeout: 10s
        send_batch_size: 1024
exporters:
    otlp_grpc/jaeger:
        endpoint: jaeger:14250
        tls:
            insecure: true
    otlp_grpc/tempo:
        endpoint: tempo:4317
        tls:
            insecure: true
    otlp_http/loki:
        endpoint: http://loki:3100/loki/api/v1/push
    debug:
        verbosity: detailed
service:
    pipelines:
        traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlp_grpc/tempo, otlp_grpc/jaeger, debug]

        logs:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlp_http/loki, debug]

        metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug]